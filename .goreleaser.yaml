version: 2

before:
  hooks:
    - go mod tidy
    # Release builds embed the container runtime; fail fast when the
    # payload was not assembled (make bundle) before goreleaser runs.
    - test -f runtime/payload/container-runtime.tar.gz

builds:
  - env:
      - CGO_ENABLED=0
    # Apple `container` requires macOS on Apple Silicon, and the bundled
    # runtime payload contains arm64 binaries only.
    goos:
      - darwin
    goarch:
      - arm64
    # Embed the container runtime payload assembled by `make bundle`
    # (see .github/workflows/goreleaser.yaml).
    flags:
      - -tags=bundled
    ldflags:
      - -s -w -X k3c/version.Version={{.Version}} -X k3c/version.GitCommit={{.Commit}} -X k3c/version.BuildDate={{.Date}}

release:
  github:
    owner: philipparndt
    name: k3c

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: k3c
    homepage: https://github.com/philipparndt/k3c
    description: "Local k3s clusters on Apple container — like k3d, without Docker"
    license: "Apache-2.0"

    url_template: "https://github.com/philipparndt/k3c/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

    commit_author:
      name: Philipp Arndt
      email: opensource@rnd7.de

    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"

    directory: Formula

    install: |
      bin.install "k3c"

      begin
        bash_output = Utils.safe_popen_read({ "SHELL" => "bash" }, "#{bin}/k3c completion bash")
        (bash_completion/"k3c").write bash_output
      rescue => e
        opoo "Failed to install bash completion: #{e}"
      end

      begin
        zsh_output = Utils.safe_popen_read({ "SHELL" => "zsh" }, "#{bin}/k3c completion zsh")
        (zsh_completion/"_k3c").write zsh_output
      rescue => e
        opoo "Failed to install zsh completion: #{e}"
      end

      begin
        fish_output = Utils.safe_popen_read({ "SHELL" => "fish" }, "#{bin}/k3c completion fish")
        (fish_completion/"k3c.fish").write fish_output
      rescue => e
        opoo "Failed to install fish completion: #{e}"
      end

    repository:
      owner: philipparndt
      name: homebrew-k3c
      branch: main
      pull_request:
        enabled: false
